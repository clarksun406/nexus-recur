services:
  postgres:
    image: postgres:16-alpine
    container_name: nexus-recur-postgres
    environment:
      POSTGRES_DB: nexus_recur
      POSTGRES_USER: nexus_recur
      POSTGRES_PASSWORD: nexus_recur
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus_recur -d nexus_recur"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
