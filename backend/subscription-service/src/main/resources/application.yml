server:
  port: 8080

spring:
  application:
    name: subscription-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/nexus_recur}
    username: ${DB_USERNAME:nexus_recur}
    password: ${DB_PASSWORD:nexus_recur}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    open-in-view: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

subscription:
  webhook-secret: change-me
  checkout-base-url: https://checkout.example.local
  auth:
    enabled: ${AUTH_ENABLED:true}
  webhook-outbound-enabled: ${WEBHOOK_OUTBOUND_ENABLED:true}
  webhook-connect-timeout-ms: ${WEBHOOK_CONNECT_TIMEOUT_MS:5000}
  webhook-read-timeout-ms: ${WEBHOOK_READ_TIMEOUT_MS:10000}

permission:
  server-url: ${PERMISSION_SERVER_URL:http://localhost:8090}
  service-token: ${PERMISSION_SERVICE_TOKEN:}
  cache-ttl-seconds: ${PERMISSION_CACHE_TTL_SECONDS:60}
  enabled: ${PERMISSION_ENABLED:false}

payment-gateway:
  enabled: ${PAYMENT_GATEWAY_ENABLED:false}
  base-url: ${PAYMENT_GATEWAY_URL:http://localhost:8081}
